<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>⚡ Jeu du clic rapide</title>
  <style>
    body { 
      text-align: center; 
      font-family: Arial; 
      margin-top: 50px; 
      background-color: #006400; /* fond vert foncé */
      color: white; /* texte blanc pour bien ressortir */
    }
    #btn {
      padding: 15px 30px;
      font-size: 20px;
      display: none;
      cursor: pointer;
    }
    button {
      background-color: #fff;
      color: #000;
      border: none;
      border-radius: 5px;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>⚡ Jeu du clic rapide</h1>
  <p>Attends que le bouton apparaisse et clique dessus le plus vite possible !</p>
  <button id="start">Commencer</button>
  <button id="btn">CLIQUE !</button>
  <p id="result"></p>

  <script>
    let startTime;

    document.getElementById("start").onclick = function() {
      document.getElementById("result").innerText = "";
      this.style.display = "none";

      let delay = Math.random() * 3000 + 1000; // 1 à 4 sec
      setTimeout(() => {
        document.getElementById("btn").style.display = "inline-block";
        startTime = Date.now();
      }, delay);
    };

    document.getElementById("btn").onclick = function() {
      let reactionTime = (Date.now() - startTime) / 1000;
      document.getElementById("result").innerText = "Ton temps : " + reactionTime + "s";
      this.style.display = "none";
      document.getElementById("start").style.display = "inline-block";
    };
  </script>
</body>
</html>
